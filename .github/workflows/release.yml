name: Release Skills

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        run: |
          for skill_dir in */; do
            skill_dir="${skill_dir%/}"
            if [ -f "$skill_dir/SKILL.md" ]; then
              zip -r "${skill_dir}.skill" "$skill_dir"
              echo "Packaged: ${skill_dir}.skill"
            fi
          done

      - name: Create prerelease (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest (prerelease)
          files: "*.skill"
          prerelease: true
          make_latest: false

      - name: Create release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.skill"
          generate_release_notes: true
          make_latest: true
